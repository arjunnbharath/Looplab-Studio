<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Product — LoopLab Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/page-home.css" />
  <link rel="stylesheet" href="css/page-nav.css" />
  <link rel="stylesheet" href="css/page-product.css" />
  <link rel="stylesheet" href="css/page-footer.css" />
  <!-- Load catalog before body so __PRODUCTS_CATALOG__ exists when page-product.js runs -->
  <script src="js/products-catalog-bundled.js"></script>
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>

  <div id="jc-site-nav-mount" data-nav-partial="partials/page-nav.html"></div>

  <main id="main" class="rx-main pdp-page">
    <div class="pdp-topbar">
      <button type="button" class="pdp-back" id="pdp-back">Back</button>
      <nav class="pdp-bc" id="pdp-bc" aria-label="Breadcrumb"></nav>
    </div>

    <p id="pdp-loading" class="pdp-loading">Loading product…</p>

    <div id="pdp-state" class="pdp-state" hidden>
      <p class="pdp-miss-msg">This product could not be loaded. Open this site over HTTP (for example <code>npx serve</code>) so product data can load, or check the link.</p>
      <a href="products.html">Back to all products</a>
    </div>

    <article id="pdp-root" class="pdp" hidden>
      <div class="pdp-grid">
        <div class="pdp-gallery">
          <img id="pdp-img" src="" alt="" width="720" height="960" decoding="async" />
        </div>

        <div class="pdp-buy">
          <p class="pdp-brand" id="pdp-brand">LoopLab Studio</p>
          <h1 class="pdp-title" id="pdp-title">Product</h1>
          <p class="pdp-price" id="pdp-price"></p>

          <div class="pdp-size-row">
            <span>Select Size</span>
            <a class="pdp-size-guide" href="#">Size Guide</a>
          </div>
          <div class="pdp-sizes" id="pdp-sizes" role="group" aria-label="Select size"></div>

          <div class="pdp-actions">
            <button type="button" class="pdp-btn pdp-btn--primary" id="pdp-add">
              <span id="pdp-add-label">ADD TO BAG</span>
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M6 8h15l-1.5 12H7.5L6 8Z"
                  stroke="currentColor"
                  stroke-width="1.35"
                  stroke-linejoin="round"
                />
                <path
                  d="M9 8V6a3 3 0 0 1 6 0v2"
                  stroke="currentColor"
                  stroke-width="1.35"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <button type="button" class="pdp-btn pdp-btn--outline" id="pdp-wish" aria-pressed="false">
              <span>WISHLIST</span>
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 21s-7-4.35-9-9c-1.2-2.4-.5-5.5 2-7 2.1-1.3 4.9-.8 7 1 2.1-1.8 4.9-2.3 7-1 2.5 1.5 3.2 4.6 2 7-2 4.65-9 9-9 9Z"
                  stroke="currentColor"
                  stroke-width="1.35"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>

          <div class="pdp-tabs" role="tablist" aria-label="Product information">
            <button type="button" class="pdp-tab" role="tab" data-tab="details" aria-selected="true">Product Details</button>
            <button type="button" class="pdp-tab" role="tab" data-tab="shipping" aria-selected="false">Shipping &amp; Returns</button>
            <button type="button" class="pdp-tab" role="tab" data-tab="designer" aria-selected="false">About Designer</button>
          </div>

          <div class="pdp-panel" id="pdp-panel-details" role="tabpanel" data-tabpanel="details"></div>
          <div class="pdp-panel" id="pdp-panel-shipping" role="tabpanel" data-tabpanel="shipping" hidden></div>
          <div class="pdp-panel" id="pdp-panel-designer" role="tabpanel" data-tabpanel="designer" hidden></div>
        </div>
      </div>
    </article>
  </main>

  <div id="jc-site-footer-mount" data-footer-partial="partials/footer.html"></div>
  <script src="js/page-nav-html-bundled.js" defer></script>
  <script src="js/page-nav-loader.js" defer></script>
  <script src="js/page-nav-mobile.js" defer></script>
  <script src="js/page-cart-store.js" defer></script>
  <script src="js/page-cart-page.js" defer></script>
  <script src="js/page-product.js" defer></script>
  <script src="js/page-footer-html-bundled.js" defer></script>
  <script src="js/page-footer-loader.js" defer></script>
  <script src="js/page-newsletter.js" defer></script>
</body>
</html>
